[Boost]
patches-source = "wchill/patcheddit"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl    = "https://boost-for-reddit.en.uptodown.com/android"
patcher-args = "-e 'Spoof client' -Oclient-id=fyANDeFodM3bIfthz8z0yQ"
arch = "all" 
build-mode = "apk"

[Strava]
patches-source = "RookieEnough/De-ReVanced"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://strava.en.uptodown.com/android"
included-patches = "'Disable Play Store updates'"
patcher-args = "-e 'Hide distractions' -Oupselling=true -Opromo=true -OfollowSuggestions=true -OchallengeSuggestions=true -OjoinChallenge=true -OjoinClub=true -OactivityLookback=true"
arch = "arm64-v8a"
build-mode = "apk"

[MacroFactor]
patches-source = "lennyRBLX/apk-patches"
cli-source = "revanced/revanced-cli"
uptodown-dlurl = "https://macrofactor-diet-sidekick-and-macro-tracker.en.uptodown.com/android"
