enable-module-update = true # set this to false if you do not want to receive updates for the module
parallel-jobs = 1
# see https://github.com/nvbangg/revanced-morphe-builder/blob/main/CONFIG.md for more detailed explanations

[YouTube]
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
excluded-patches = "'Custom branding' 'Theme'"

[YouTube-Music]
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
excluded-patches = "'Custom branding' 'Theme'"

[Google-Photos]
patches-source = "RookieEnough/De-ReVanced"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://google-photos.en.uptodown.com/android"
arch = "arm64-v8a"

[Google-Recorder]
patches-source = "RookieEnough/De-ReVanced"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://opnemer.en.uptodown.com/android"
arch = "arm64-v8a"

[Instagram]
patches-source = "crimera/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
arch = "arm64-v8a"

[X]
patches-source = "crimera/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://twitter.en.uptodown.com/android"

[Reddit]
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://reddit-official-app.en.uptodown.com/android"

[Boost]
patches-source = "wchill/patcheddit"
cli-source = "MorpheApp/morphe-cli"
archive-dlurl = "https://archive.org/download/tpRaa/com.rubenmayayo.reddit"
patcher-args = "-e 'Spoof client' -Oclient-id=fyANDeFodM3bIfthz8z0yQ"

[Strava]
patches-source = "RookieEnough/De-ReVanced"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://strava.en.uptodown.com/android"
patcher-args = "-e 'Hide distractions' -Oupselling=true -Opromo=true -OfollowSuggestions=true -OchallengeSuggestions=true -OjoinChallenge=true -OjoinClub=true -OactivityLookback=true"
arch = "arm64-v8a"

[Duolingo]
patches-source = "hoo-dles/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://duolingo.en.uptodown.com/android"

[Busuu]
patches-source = "hoo-dles/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://busuu.en.uptodown.com/android"

[Windy]
patches-source = "hoo-dles/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
uptodown-dlurl = "https://windy-wind-waves-and-hurricanes-forecast.en.uptodown.com/android"
